# ──────────────────────────────────────────────
#  SkillEX – Spring Boot Application Properties
# ──────────────────────────────────────────────
# Secrets are read from environment variables.
# For local development, copy application-local.properties.example
# to application-local.properties and fill in real values.
# application-local.properties is gitignored — NEVER commit it.
# ──────────────────────────────────────────────

spring.application.name=skillex-backend
server.port=8080
server.servlet.context-path=/

# ── MySQL DataSource ──────────────────────────
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/skillex?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ───────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ── Flyway ────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ── JWT ───────────────────────────────────────
# Set APP_JWT_SECRET env var to a strong 256-bit random string in production
app.jwt.secret=${APP_JWT_SECRET:CHANGE_THIS_IN_PRODUCTION_USE_ENV_VAR}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:86400000}

# ── Google OAuth2 (Spring Security) ───────────
# Set these via env vars — never hardcode in this file
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}

# ── AI / Gemini ───────────────────────────────
# Set GEMINI_API_KEY env var — never expose in frontend code
app.ai.gemini-api-key=${GEMINI_API_KEY:}

# ── Embeddings (API + local fallback) ─────────
# provider: local (offline) or api (Gemini embedding endpoint)
app.embedding.provider=${EMBEDDING_PROVIDER:local}
app.embedding.fallback-to-local=${EMBEDDING_FALLBACK_TO_LOCAL:true}
app.embedding.api.key=${EMBEDDING_API_KEY:${GEMINI_API_KEY:}}
app.embedding.api.model=${EMBEDDING_API_MODEL:gemini-embedding-001}
app.embedding.api.timeout-ms=${EMBEDDING_API_TIMEOUT_MS:8000}

# ── Intent Matching (hybrid: catalog + dynamic intent/tag) ──
app.matching.intent.candidate-pool-factor=${INTENT_CANDIDATE_POOL_FACTOR:4}
app.matching.intent.reason-threshold=${INTENT_REASON_THRESHOLD:0.25}
app.matching.intent.embedding-cache-max-entries=${INTENT_EMBED_CACHE_MAX:4000}
app.matching.intent.redis-enabled=${INTENT_EMBED_REDIS_ENABLED:false}
app.matching.intent.redis-ttl-hours=${INTENT_EMBED_REDIS_TTL_HOURS:24}
app.matching.intent.redis-key-prefix=${INTENT_EMBED_REDIS_PREFIX:skillex:intent-embedding}
app.matching.intent.lexical-weight=${INTENT_LEXICAL_WEIGHT:0.40}
app.matching.intent.embedding-weight=${INTENT_EMBED_WEIGHT:0.60}
app.matching.intent.stop-words=i,we,to,the,a,an,and,or,with,for,of,in,on,at,my,our,want,learn,teach,need,help,from,by,can,be,how,about,ami,amra,amii,chai,shikhte,shekhate,ki,kibhabe,amar,amader
app.matching.intent.synonyms.crafting=craft
app.matching.intent.synonyms.crafts=craft
app.matching.intent.synonyms.diy=craft
app.matching.intent.synonyms.handmade=craft
app.matching.intent.synonyms.upcycle=recycle
app.matching.intent.synonyms.upcycling=recycle
app.matching.intent.synonyms.recycled=recycle
app.matching.intent.synonyms.recycling=recycle
app.matching.intent.synonyms.scrap=recycle
app.matching.intent.synonyms.trash=recycle
app.matching.intent.synonyms.waste=recycle
app.matching.intent.synonyms.useless=recycle
app.matching.intent.synonyms.household=home
app.matching.intent.synonyms.ghorer=home
app.matching.intent.synonyms.basha=home
app.matching.intent.synonyms.oporojonio=recycle

# ── Catalog Governance Pipeline ──
app.catalog.pipeline.auto-promote-enabled=${CATALOG_AUTO_PROMOTE_ENABLED:true}
app.catalog.pipeline.auto-promote-min-occurrences=${CATALOG_AUTO_PROMOTE_MIN_OCCURRENCES:3}
app.catalog.pipeline.auto-promote-min-confidence=${CATALOG_AUTO_PROMOTE_MIN_CONFIDENCE:70}
app.catalog.pipeline.pending-list-default-limit=${CATALOG_PENDING_LIST_DEFAULT_LIMIT:50}

# ── CORS (Vite dev + production) ──────────────
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

# ── Redis (optional, used when intent Redis cache is enabled) ─────────────
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.timeout=${REDIS_TIMEOUT_MS:2000ms}

# ── Jackson ───────────────────────────────────
# ISO-8601 dates (e.g. "2024-03-09T10:30:00") instead of epoch timestamps
spring.jackson.serialization.write-dates-as-timestamps=false
# Omit null fields from responses — smaller payloads, cleaner API
spring.jackson.default-property-inclusion=non_null
# Don't fail if client sends extra fields (forward-compatibility)
spring.jackson.deserialization.fail-on-unknown-properties=false
# Prevent errors when Hibernate proxies are encountered (handled by JacksonConfig bean)
spring.jackson.serialization.fail-on-empty-beans=false

# ── Logging ───────────────────────────────────
logging.level.root=WARN
logging.level.com.skillex=INFO
logging.level.org.springframework.boot.web.embedded.tomcat=INFO
logging.level.org.flywaydb=INFO
spring.main.banner-mode=off

# ── DevTools ──────────────────────────────────
# Disable automatic restart to avoid restart loops in the VS Code terminal.
spring.devtools.restart.enabled=false
spring.devtools.livereload.enabled=false
