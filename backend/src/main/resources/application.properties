# ──────────────────────────────────────────────
#  SkillEX – Spring Boot Application Properties
# ──────────────────────────────────────────────

spring.application.name=skillex-backend
server.port=8080
server.servlet.context-path=/

# ── MySQL DataSource ──────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/skillex?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=your_password_here
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ───────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ── Flyway ────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ── JWT ───────────────────────────────────────
app.jwt.secret=CHANGE_THIS_TO_A_STRONG_256BIT_SECRET_KEY_IN_PRODUCTION
app.jwt.expiration-ms=86400000

# ── CORS (Vite dev + production) ──────────────
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173

# ── Logging ───────────────────────────────────
logging.level.com.skillex=DEBUG
logging.level.org.springframework.security=WARN
